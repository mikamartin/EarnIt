name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the base64-encoded keystore secret and write it to a temp file.
      # The path is passed into keystore.properties so the existing signing config picks it up.
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/earnit.jks

      # Recreate keystore.properties from secrets — never stored in the repo.
      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ runner.temp }}/earnit.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: earnit-release-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
