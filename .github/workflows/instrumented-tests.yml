name: Instrumented Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest

    # Sharded along the Repository/Utility vs. UI layer split documented in TESTING.md's
    # tagging convention. Repository/Utility tests never launch MainActivity or touch Compose;
    # the UI shard is where every MainActivity + Compose recomposition happens. Each shard
    # gets its own runner VM and freshly-booted emulator. Filtered by annotation rather than an
    # explicit class list, so a new test class is picked up automatically as soon as it carries
    # its required layer tag — checkInstrumentedTestTags (./gradlew check) enforces that every
    # class has one. The repository-utility shard uses notAnnotation (everything that isn't
    # @UiTest) rather than OR-ing @RepositoryTest,@UtilityTest — AndroidJUnitRunner doesn't
    # treat a comma-separated annotation value as an OR filter, so that combination silently
    # matched zero tests instead of failing loudly.
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: repository-utility
            filterKey: notAnnotation
            filterValue: com.earnit.app.tags.UiTest
          - shard: ui
            filterKey: annotation
            filterValue: com.earnit.app.tags.UiTest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # KVM is required for hardware-accelerated emulation on GitHub Actions ubuntu runners.
      # Without it the emulator falls back to software mode, which is too slow and flaky for CI.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Cache the AVD snapshot so subsequent runs skip the 3-5 min cold-boot step. Keyed per
      # shard (both shards use the same AVD config) so two parallel matrix jobs never race to
      # write the same cache entry on a cold cache.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Keyed to the API level and RAM config so a version bump to either forces a fresh
          # snapshot rather than silently reusing one baked for the old config.
          key: avd-api36-mem4096-${{ matrix.shard }}

      # Only runs on a cache miss to generate the snapshot for future runs.
      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          # API 36 — matches Play's minimum target requirement.
          target: default
          # default target (no Play Services) is sufficient and faster than google_apis.
          arch: x86_64
          force-avd-creation: false
          # -memory 4096: default AVD guest RAM (~2.4GB) measurably declined over the course of
          # a UI test run (tracked via /proc/meminfo during the ci-shard-instrumented-tests
          # investigation), independent of the unrelated "Failed to find ColorBuffer" log noise
          # (a known red herring for this class of failure — see
          # ReactiveCircus/android-emulator-runner#358). More guest headroom targets that
          # measured decline directly.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096
          disable-animations: false
          script: echo "AVD snapshot created."

      - name: Run instrumented tests (${{ matrix.shard }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096
          # Disabling animations speeds up Compose UI assertions in instrumented tests.
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.${{ matrix.filterKey }}=${{ matrix.filterValue }}

      # Upload results even on failure so flaky-test failures are diagnosable from CI.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-${{ matrix.shard }}
          path: app/build/outputs/androidTest-results/
