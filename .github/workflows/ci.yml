name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Unit tests
        run: ./gradlew test

      - name: Test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          check_name: "Results: Unit tests"
          report_paths: "**/test-results/test*/**/*.xml"
          job_summary: true
          detailed_summary: true

      - name: Build debug APK
        run: ./gradlew assembleDebug
